name: Mirror to seazone-tech

on:
  push:
    branches: ['**']
  delete:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to seazone-tech
        run: |
          git push --mirror https://${{ secrets.MIRROR_TOKEN }}@github.com/seazone-tech/hackathon-monitordeonboarding.git
